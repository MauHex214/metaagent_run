# Phase 6 schema decisions (machine-readable source of truth)
#
# Upstream: env5_main_list.csv (403 rows, bugfix version) + env5_signature_*.csv
# Downstream: phase6 renderer produces env6_extraction_targets.json for step5
#
# Each `main_list` entry:
#   target:              phase6 canonical name (uses normalized full-name form)
#   subtype:             source subtype in env3/env4
#   merge_from:          list of env5 main_list target_field_name values to merge
#   merge_from_sig:      {env: [target_names]} to pull from signatures into main
#   merge_from_subtype:  {subtype: [target_names]} to cross-subtype reassign
#   extra_aliases:       hand-added aliases (not present in env5 data)
#
# Phase6 renderer behavior:
#   - For each `target`, collect all raw_key from env5_main_list rows matching
#     (subtype × merge_from) plus their member_raw_keys and merged_bag_variants.
#   - aliases = set(member_raw_keys) ∪ extra_aliases — the target_name itself.
#
# Each signature entry:
#   target:      signature canonical name
#   env:         Open_ocean | Coastal_waters | Lake | Wetlands
#   from_subtype: source subtype (for bookkeeping)
#   merge_from:  env5 signature target_field_name(s) to collect aliases from

version: 1
generated_at: "2026-04-24"
source_doc: "phase6_decisions.md v1"

# ═══════════════════════════════════════════════════════════════════════════
# MAIN LIST — 66 targets
# ═══════════════════════════════════════════════════════════════════════════
main_list:

  # ── Batch 1: unambiguous subtypes (17 targets) ────────────────────────

  - target: salinity
    subtype: salinity
    merge_from: [salinity]

  - target: temperature
    subtype: temperature
    merge_from: [temperature]

  - target: ph
    subtype: ph_alkalinity
    merge_from: [ph]

  - target: alkalinity
    subtype: ph_alkalinity
    merge_from: [alkalinity]

  - target: conductivity
    subtype: conductivity_tds
    merge_from: [conductivity]

  - target: total_dissolved_solids
    subtype: conductivity_tds
    merge_from: [total_dissolved_solid, total_dissolved_solids]

  - target: chlorophyll_a
    subtype: chlorophyll_pigment
    merge_from: [chlorophyll_a, chlorophyll_a_concentration, chlorophyll_concentration]

  - target: fluorescence
    subtype: chlorophyll_pigment
    merge_from: [fluorescence, chlorophyll_a_fluorescence, chlorophyll_fluorescence]

  - target: turbidity
    subtype: turbidity_transparency
    merge_from: [turbidity, visibility, colour, water_clarity]

  - target: secchi_depth
    subtype: turbidity_transparency
    # 收 vertical_position 里的 secchi_disk_depth
    merge_from: [secchi_depth, transparency, secchi]
    merge_from_subtype:
      vertical_position: [secchi_disk_depth]

  - target: suspended_particulate_matter
    subtype: turbidity_transparency
    merge_from: [suspended_particulate_matter, suspended_solids, tss]
    merge_from_subtype:
      conductivity_tds: [total_suspended_solids]

  - target: latitude
    subtype: geo_coord
    merge_from: [latitude, latitude_range]
    extra_aliases: [coordinates, geographic_coordinates, geographical_position, utm_coordinates]

  - target: longitude
    subtype: geo_coord
    merge_from: [longitude, longitude_e, longitude_range, latitude_longitude]
    extra_aliases: [coordinates, geographic_coordinates, utm_coordinates]

  - target: dissolved_oxygen
    subtype: oxygen
    merge_from: [oxygen, dissolved_oxygen, oxygenation]

  - target: oxygen_saturation
    subtype: oxygen
    merge_from: [oxygen_saturation]

  # Force-split from shared BOD+COD canonical (phase4 EDC didn't separate):
  - target: biochemical_oxygen_demand
    subtype: oxygen
    force_split_from_canonical:
      env5_target: biological_oxygen_demand  # env5 target under which BOD+COD were merged
      match_raw_keys: [bod, bod5, five_day_biochemical_oxygen_demand, "5-day_biochemical_oxygen_demand", biochemical_oxygen_demand, biological_oxygen_demand]

  - target: chemical_oxygen_demand
    subtype: oxygen
    force_split_from_canonical:
      env5_target: biological_oxygen_demand
      match_raw_keys: [cod, chemical_oxygen_demand]

  # ── Batch 2 Group 1: high-dispersion location/time/category (6) ───────

  - target: water_depth
    subtype: vertical_position
    merge_from:
      - depth
      - sampling_depth
      - water_depth
      - sediment_depth
      - max_depth
      - mean_depth
      - depth_range
      - bottom_depth
      - average_depth
      - position
      - collection_depth
      - water_column_depth
      - layer
      - thermocline_depth
      - maximum_depth
      - water_layer
      - soil_depth
      - water_column
      - depth_interval
      - bathymetry
      - core_depth
      - mixed_layer_depth
      - depth_layer
      - depth_zone
      - maximum_water_depth
      - minimum_depth_in_meters
      - depth_strata
      - mean_water_depth
      - euphotic_zone_depth
      - sampling_layer
      - photic_zone_depth
      - depth_max
      - sampled_depth
      - min_depth
      - depth_gradient
      - oxygen_penetration_depth
      - nitracline_depth
      - bot_depth
      - stratigraphic_depth
      - halocline_depth
      - sample_depths

  - target: elevation
    subtype: vertical_position
    merge_from: [elevation, altitude, sea_level, elevation_range]

  - target: ice_snow_thickness
    subtype: vertical_position
    merge_from: [ice_thickness, snow_depth]

  - target: collection_date
    subtype: time_point
    merge_from:
      - collection_date
      - sampling_date
      - date
      - year
      - sampling_time
      - month
      - time
      - collection_year
      - collection_time
      - day
      - sampling_month
      - sample_date
      - event_date
      - start_date
      - survey_date
      - year_sampled
      - time_of_day
      - collection_month
      - end_date
      - date_time
      - time_point
      - start_time
      - capture_date
      - local_time
      - survey_year
      - hour
      - month_year
      - end_time
      - date_deployed
      - datetime
      - observation_date
      - day_of_year
      - catch_date
      - timestamp
      - sampling_year
    # Pull cross-subtype time stuff:
    merge_from_subtype:
      time_duration: [time_of_year, years]
    # Pull signatures that should collapse into main:
    merge_from_sig:
      Open_ocean: [time_utc, day_night, event_time, local_date, date_time_utc]
      Lake: [coring_date]

  - target: sampling_location
    subtype: sampling_site
    merge_from:
      - sampling_location
      - sampling_site
      - sampling_station
      - sampling_locality
      - sampling_point
      - site_name
      - transect
      - site_code
      - study_site
      - station_name
      - station_id
      - sampling_areas
      - type_locality
      - city
      - river_system
      - bay
      - survey_site

  - target: habitat
    subtype: habitat_biome
    merge_from:
      - habitat
      - vegetation
      - environment
      - zone
      - isolation_source
      - vegetation_type
      - site_type
      - sampling_zone
      - estuary
      - biome
      - intertidal_zone
      - wetland
      - pond_type
      - biotope
      - environment_feature
      - vegetation_zone
      - environment_biome
      - littoral_zone

  # ── Batch 2 Group 2: time_duration / geo_region / material (6) ────────

  - target: season
    subtype: time_duration
    merge_from: [season, seasonal_period, summer_season, winter_season, growing_season]

  - target: sampling_period
    subtype: time_duration
    merge_from: [sampling_period, collection_period, sampling_time_period, sampling_date_range]

  - target: geographic_location
    subtype: geo_region
    merge_from:
      - geographic_location
      - region
      - collection_country
      - province
      - sampling_region
      - basin
      - island
      - coast
      - geographic_area
      - geo_loc_name
      - subregion
      - geography
      - sub_region
      - region_of_origin
      - higher_geography
      - sea_area
      - river_basin

  - target: sediment_type
    subtype: material_medium_type
    merge_from: [sediment_type, soil_type, sediment_layer, type_of_sample, environment_material]

  - target: size_fraction
    subtype: material_medium_type
    merge_from: [size_fraction, mesh_size, filter_size]
    # filter_pore_size 移过来（当前在 trace_chemistry 是 phase3 误判）
    merge_from_subtype:
      trace_chemistry: [filter_pore_size]

  - target: grain_size_class
    subtype: material_medium_type
    merge_from: [clay, clay_content, sand_content, fine_sand]

  # ── Batch 2 Group 3A: nutrient_chemistry (12) ─────────────────────────

  - target: nitrate
    subtype: nutrient_chemistry
    merge_from: [nitrate, nitrate_nitrogen, nitrate_concentration]

  - target: nitrite
    subtype: nutrient_chemistry
    merge_from: [nitrite, nitrite_nitrogen, nitrate_nitrite]

  - target: ammonium
    subtype: nutrient_chemistry
    merge_from: [ammonium, ammonium_nitrogen, ammonia, ammonia_nitrogen, ammonium_concentration]

  - target: phosphate
    subtype: nutrient_chemistry
    merge_from: [phosphate, phosphate_phosphorus, phosphate_concentration]

  - target: silicate
    subtype: nutrient_chemistry
    merge_from: [silicate, silicic_acid]

  - target: sulfate
    subtype: nutrient_chemistry
    merge_from: [sulfate, sulfate_concentration]

  - target: methane
    subtype: nutrient_chemistry
    merge_from: [methane, methane_concentration]

  - target: total_organic_carbon
    subtype: nutrient_chemistry
    merge_from: [total_organic_carbon]

  - target: organic_matter_content
    subtype: nutrient_chemistry
    merge_from: [organic_matter_content, organic_matter]

  - target: carbon_nitrogen_ratio
    subtype: nutrient_chemistry
    merge_from: [carbon_nitrogen_ratio, carbon_to_nitrogen_ratio]

  - target: nitrogen_to_phosphorus_ratio
    subtype: nutrient_chemistry
    merge_from: [nitrogen_to_phosphorus_ratio, "n:p_ratio"]

  - target: total_sulfur
    subtype: nutrient_chemistry
    merge_from: [total_sulfur]

  # ── Batch 2 Group 3B: trace_chemistry (10 molecules + 4 sediment physical + 6 isotopes) ─

  - target: iron
    subtype: trace_chemistry
    merge_from: [iron]

  - target: copper
    subtype: trace_chemistry
    merge_from: [copper]

  - target: arsenic
    subtype: trace_chemistry
    merge_from: [arsenic, as_concentration]

  - target: chromium
    subtype: trace_chemistry
    merge_from: [chromium]

  - target: potassium
    subtype: trace_chemistry
    merge_from: [potassium, available_potassium]

  - target: sulfide
    subtype: trace_chemistry
    merge_from: [sulfide, hydrogen_sulfide, h2s_concentration, hydrogen_sulfide_concentration]

  - target: carbonate_content
    subtype: trace_chemistry
    merge_from: [carbonate_content]

  - target: total_hardness
    subtype: trace_chemistry
    merge_from: [total_hardness]

  - target: sediment_grain_size
    subtype: trace_chemistry
    merge_from: [sediment_grain_size, particle_size]

  - target: sediment_density
    subtype: trace_chemistry
    merge_from: [sediment_density, bulk_density]

  - target: sediment_porosity
    subtype: trace_chemistry
    merge_from: [sediment_porosity]

  - target: sediment_grain_size_stats
    subtype: trace_chemistry
    merge_from: [silt_content, mud_content, sorting, skewness]

  - target: delta_c13
    subtype: trace_chemistry
    merge_from: ["δ13c", "δ13c_‰", delta13c, "13c"]

  - target: delta_n15
    subtype: trace_chemistry
    merge_from: ["δ15n", "δ15n_‰", "15n"]

  - target: delta_o18
    subtype: trace_chemistry
    merge_from: ["δ18o", d18o, "18o", delta18o]

  - target: sr_isotope_ratio
    subtype: trace_chemistry
    merge_from: ["87sr_86sr"]

  - target: aragonite_saturation
    subtype: trace_chemistry
    merge_from: ["ωaragonite", "ωarag", "ωa", "ωar"]

  - target: calcite_saturation
    subtype: trace_chemistry
    merge_from: ["ωca", "ωcalc", "ωcalcite"]

  - target: oxidation_reduction_potential
    subtype: trace_chemistry
    merge_from: [oxidation_reduction_potential]
    extra_aliases: [orp, orp_mv, eh, eh_mv, "oxidation-reduction_potential"]

  # ── Batch 3: edge subtypes (15) ───────────────────────────────────────

  - target: river_discharge
    subtype: spatial_metric
    merge_from: [river_discharge, discharge, river_flow]

  - target: slope
    subtype: spatial_metric
    merge_from: [slope]

  - target: sedimentation_rate
    subtype: spatial_metric
    merge_from: [sedimentation_rate]

  - target: precipitation
    subtype: physical_env_driver
    merge_from: [total_precipitation, runoff]

  - target: wind_speed
    subtype: physical_env_driver
    merge_from: [wind_speed, wind]

  - target: wind_direction
    subtype: physical_env_driver
    merge_from: [wind_direction]

  - target: light_intensity
    subtype: physical_env_driver
    merge_from:
      - light_intensity
      - photoperiod
      - light_dark_cycle
      - light_attenuation
      - photosynthetic_active_radiation
      - photosynthetically_active_radiation
      - par_irradiance
      - light_penetration
      - daylength
    # Pull light_conditions from env_state_context:
    merge_from_subtype:
      env_state_context: [light_conditions]

  - target: pressure
    subtype: physical_env_driver
    merge_from: [pressure]

  - target: soil_moisture
    subtype: physical_env_driver
    merge_from: [soil_moisture, soil_moisture_content, soil_water_content]

  - target: water_flow
    subtype: physical_env_driver
    merge_from: [current_velocity, flow_rate, velocity, current_direction, water_velocity, wave_height, wave_action]

  - target: humidity
    subtype: physical_env_driver
    merge_from: [humidity, relative_humidity]

  - target: water_level
    subtype: physical_env_driver
    merge_from: [water_level]
    # Pull from vertical_position:
    merge_from_subtype:
      vertical_position: [tidal_elevation, tide_level, groundwater_level, groundwater_table]

  - target: water_body_type
    subtype: water_body_descriptor
    merge_from: [lake, surface_water, water_body, ocean, river, water, sea, source_water, body_of_water]
    merge_from_sig:
      Lake: [pond, inflow, outflow]

  - target: tidal_stage
    subtype: env_state_context
    merge_from: [tide, tide_condition, tidal_phase, tidal_zone, tidal_influence, tidal_condition, tidal_regime]

  - target: water_quality_status
    subtype: env_state_context
    merge_from: [water_quality]

  - target: land_use
    subtype: env_state_context
    merge_from: [land_use, land_use_type, land_cover]

  - target: stratification
    subtype: env_state_context
    merge_from: [stratification, thermal_stratification, water_column_stratification]


