# ═══════════════════════════════════════════════════════════════════════════
# EXCLUDED TARGETS (R1-R4) — explicit rejection list with reason codes
# ═══════════════════════════════════════════════════════════════════════════

excluded:
  # R1: PMID 覆盖度阈值低
  - {env5_target: pheophytin,                subtype: chlorophyll_pigment,       reason: R1, detail: "pmid=20 叶绿素降解副产物"}
  - {env5_target: phaeopigment,              subtype: chlorophyll_pigment,       reason: R1, detail: "pmid=22 同上"}
  - {env5_target: urea,                      subtype: nutrient_chemistry,        reason: R1, detail: "pmid=11"}
  # R1+R2: 低 pmid + 量纲不同
  - {env5_target: primary_productivity,      subtype: chlorophyll_pigment,       reason: R2, detail: "gC/m²/d 通量与色素浓度量纲不同"}
  - {env5_target: productivity,              subtype: chlorophyll_pigment,       reason: R2, detail: "同 primary_productivity"}

  # R2: 量纲冲突
  - {env5_target: temperature_gradient,      subtype: temperature,               reason: R2, detail: "°C/m vs °C 量纲不同"}
  - {env5_target: filter_diameter,           subtype: turbidity_transparency,    reason: R3, detail: "过滤器规格非环境"}
